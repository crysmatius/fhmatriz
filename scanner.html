<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Consulta Productos</title>
  <!-- ZXing: lee códigos desde imagen, funciona sin HTTPS -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

    body {
      background: #0000cc;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .page-header {
      width: 100%;
      background: #0000cc;
      padding: 20px 16px 16px;
      text-align: center;
    }
    .page-header h1 {
      color: #fff;
      font-size: clamp(22px, 7vw, 34px);
      font-weight: 900;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.45);
    }

    .content {
      width: 100%;
      max-width: 500px;
      padding: 16px 14px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* STATUS */
    .status {
      width: 100%;
      padding: 11px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .status.show    { display: flex; }
    .status.ok      { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.45); color:#fff; }
    .status.err     { background:rgba(255,50,60,0.3);    border:1px solid rgba(255,80,80,0.6);    color:#ffcccc; }
    .status.info    { background:rgba(255,255,255,0.1);  border:1px solid rgba(255,255,255,0.25); color:rgba(255,255,255,0.8); }
    .status.loading { background:rgba(255,255,255,0.1);  border:1px solid rgba(255,255,255,0.3);  color:#fff; }
    .dot     { width:8px; height:8px; border-radius:50%; background:currentColor; flex-shrink:0; animation:blink 1s ease-in-out infinite; }
    .spinner { width:15px; height:15px; border:2px solid rgba(255,255,255,0.3); border-top-color:#fff; border-radius:50%; flex-shrink:0; animation:spin .7s linear infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    @keyframes spin  { to{transform:rotate(360deg);} }

    /* SCAN BUTTON — abre cámara nativa */
    .btn-scan {
      width:100%; padding:20px;
      border:none; border-radius:14px;
      background:#fff; color:#0000cc;
      font-size:clamp(17px,5.5vw,22px);
      font-weight:900; letter-spacing:2px;
      text-transform:uppercase; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.3);
      transition:transform .12s, opacity .12s;
      -webkit-user-select:none; user-select:none;
    }
    .btn-scan:active { transform:scale(0.97); opacity:0.9; }
    .btn-scan svg { width:22px; height:22px; fill:currentColor; flex-shrink:0; }

    /* Input de cámara oculto */
    #camera-input { display:none; }

    /* Preview de la imagen capturada */
    #preview-wrap {
      width:100%; display:none;
      flex-direction:column; gap:10px; align-items:center;
    }
    #preview-wrap.show { display:flex; }
    #preview-img {
      width:100%; border-radius:12px;
      border:3px solid rgba(255,255,255,0.5);
      max-height:260px; object-fit:contain;
      background:#000;
    }
    .preview-hint {
      font-size:12px; color:rgba(255,255,255,0.55);
      font-weight:700; text-align:center;
    }

    /* DIVIDER */
    .divider { width:100%; display:flex; align-items:center; gap:12px; }
    .divider hr { flex:1; border:none; border-top:1px solid rgba(255,255,255,0.25); }
    .divider span { font-size:12px; color:rgba(255,255,255,.5); font-weight:700; letter-spacing:2px; }

    /* MANUAL INPUT */
    .manual-label {
      font-size:11px; font-weight:700; letter-spacing:3px;
      color:rgba(255,255,255,.55); text-transform:uppercase;
      display:block; margin-bottom:8px; width:100%;
    }
    .manual-row { display:flex; gap:8px; width:100%; }
    .manual-row input {
      flex:1; background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.35); border-radius:10px;
      padding:14px 16px; color:#fff;
      font-size:17px; font-weight:700; outline:none;
      transition:border-color .2s, background .2s;
    }
    .manual-row input::placeholder { color:rgba(255,255,255,.35); font-weight:400; }
    .manual-row input:focus { border-color:#fff; background:rgba(255,255,255,.18); }
    .manual-row button {
      background:#fff; border:none; border-radius:10px;
      padding:14px 20px; color:#0000cc;
      font-size:14px; font-weight:900; cursor:pointer; letter-spacing:1px;
      transition:transform .12s;
    }
    .manual-row button:active { transform:scale(0.96); }

    /* IFRAME RESULT */
    #result-wrap {
      width:100%; display:none;
      flex-direction:column;
      border-radius:14px; overflow:hidden;
      border:3px solid rgba(255,255,255,0.5);
      box-shadow:0 6px 28px rgba(0,0,0,0.4);
    }
    #result-wrap.show { display:flex; }

    .iframe-toolbar {
      background:#000099;
      padding:8px 12px;
      display:flex; align-items:center;
      justify-content:space-between; gap:8px; flex-shrink:0;
    }
    .iframe-toolbar .code-label {
      font-size:12px; font-weight:700; color:rgba(255,255,255,0.7);
      letter-spacing:1px; flex:1;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
    }
    .zoom-group { display:flex; align-items:center; gap:4px; }
    .zoom-group button {
      background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
      border-radius:6px; color:#fff; font-size:16px; font-weight:900;
      width:32px; height:32px; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:background .15s; line-height:1; padding:0;
    }
    .zoom-group button:active { background:rgba(255,255,255,0.3); }
    .zoom-pct { font-size:11px; font-weight:700; color:rgba(255,255,255,0.6); min-width:36px; text-align:center; }
    .btn-close-frame {
      background:rgba(255,50,60,0.3); border:1px solid rgba(255,80,80,0.5);
      border-radius:7px; color:#ffaaaa; font-size:12px; font-weight:700;
      padding:5px 10px; cursor:pointer; white-space:nowrap;
    }
    .btn-close-frame:active { background:rgba(255,50,60,0.5); }

    .iframe-scaler { width:100%; position:relative; overflow:hidden; background:#fff; }
    #result-iframe { border:none; display:block; }
  </style>
</head>
<body>

<div class="page-header">
  <h1>Consulta productos</h1>
</div>

<div class="content">

  <!-- Status -->
  <div class="status info show" id="status">
    <div class="dot"></div>
    <span id="status-text">Listo para escanear</span>
  </div>

  <!-- Input oculto que abre la cámara nativa -->
  <input type="file" id="camera-input" accept="image/*" capture="environment" />

  <!-- Botón escanear -->
  <button class="btn-scan" id="btn-scan" onclick="document.getElementById('camera-input').click()">
    <svg viewBox="0 0 24 24"><path d="M2 6a2 2 0 0 1 2-2h2V2H4a4 4 0 0 0-4 4v2h2V6zm18-2h-2v2h2v14H4V6h2V4H4a4 4 0 0 0-4 4v12a4 4 0 0 0 4 4h16a4 4 0 0 0 4-4V8a4 4 0 0 0-4-4zM8 2v2h8V2H8zm4 10H8v4h4v-4zm4-4H8v2h8V8zm0 4h-2v4h2v-4z"/></svg>
    ESCANEAR
  </button>

  <!-- Preview de imagen capturada -->
  <div id="preview-wrap">
    <img id="preview-img" alt="Foto capturada" />
    <div class="preview-hint">Procesando código de barras…</div>
  </div>

  <div class="divider"><hr/><span>O</span><hr/></div>

  <!-- Manual -->
  <label class="manual-label">Código manual</label>
  <div class="manual-row">
    <input type="text" id="manual-input" placeholder="Ingresa código..." />
    <button onclick="submitCode(document.getElementById('manual-input').value.trim())">IR</button>
  </div>

  <!-- Iframe result -->
  <div id="result-wrap">
    <div class="iframe-toolbar">
      <span class="code-label" id="code-label">COD: —</span>
      <div class="zoom-group">
        <button onclick="changeZoom(-5)">−</button>
        <span class="zoom-pct" id="zoom-pct">50%</span>
        <button onclick="changeZoom(+5)">+</button>
      </div>
      <button class="btn-close-frame" onclick="closeResult()">✕ Cerrar</button>
    </div>
    <div class="iframe-scaler" id="iframe-scaler">
      <iframe id="result-iframe" scrolling="yes"></iframe>
    </div>
  </div>

</div>

<script>
// ── ZXing setup ──────────────────────────────────────────────
// BrowserMultiFormatReader soporta todos los formatos incluyendo alfanuméricos
// (Code128, Code39, Code93, QR, EAN, UPC, ITF, Codabar, DataMatrix, PDF417, Aztec)
const hints = new Map();
hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
const barcodeReader = new ZXing.BrowserMultiFormatReader(hints);

// ── DOM refs ─────────────────────────────────────────────────
const statusEl    = document.getElementById('status');
const resultWrap  = document.getElementById('result-wrap');
const scaler      = document.getElementById('iframe-scaler');
const iframe      = document.getElementById('result-iframe');
const zoomPctEl   = document.getElementById('zoom-pct');
const manualInput = document.getElementById('manual-input');
const cameraInput = document.getElementById('camera-input');
const previewWrap = document.getElementById('preview-wrap');
const previewImg  = document.getElementById('preview-img');

let zoomScale   = 0.50;
let expectedUrl = '';
let loadCount   = 0;

// ── Cámara: captura imagen y decodifica ──────────────────────
cameraInput.addEventListener('change', async () => {
  const file = cameraInput.files[0];
  if (!file) return;

  // Mostrar preview
  const objectUrl = URL.createObjectURL(file);
  previewImg.src  = objectUrl;
  previewWrap.classList.add('show');
  setStatus('Procesando imagen…', 'loading');

  try {
    const result = await barcodeReader.decodeFromImageUrl(objectUrl);
    const code = result.getText();
    setStatus('¡Código detectado! ' + code, 'ok');
    navigator.vibrate && navigator.vibrate([80, 40, 80]);
    previewWrap.classList.remove('show');
    submitCode(code);
  } catch(e) {
    setStatus('No se detectó código. Intenta con mejor enfoque o más luz.', 'err');
  }

  // Limpiar input para permitir re-escanear el mismo archivo
  cameraInput.value = '';
});


// ── Zoom ────────────────────────────────────────────────────
function applyZoom() {
  const visibleH = Math.round(window.innerHeight * 0.62);
  const iframeW  = Math.round(scaler.clientWidth / zoomScale);
  const iframeH  = Math.round(visibleH / zoomScale);

  iframe.style.width           = iframeW + 'px';
  iframe.style.height          = iframeH + 'px';
  iframe.style.transformOrigin = 'top left';
  iframe.style.transform       = `scale(${zoomScale})`;
  scaler.style.height          = visibleH + 'px';
  zoomPctEl.textContent        = Math.round(zoomScale * 100) + '%';
}

function changeZoom(delta) {
  zoomScale = Math.min(1.0, Math.max(0.2, zoomScale + delta / 100));
  applyZoom();
}

window.addEventListener('resize', () => {
  if (resultWrap.classList.contains('show')) applyZoom();
});

// ── Cargar resultado en iframe ───────────────────────────────
function submitCode(code) {
  if (!code) { setStatus('Ingresa un código válido.', 'err'); return; }

  expectedUrl = 'http://net.fh.cl:88/ultron_mobile.asp?busca=' + encodeURIComponent(code);
  loadCount   = 0;

  document.getElementById('code-label').textContent = 'COD: ' + code;
  iframe.src = expectedUrl;
  resultWrap.classList.add('show');
  setStatus('Cargando código ' + code + '…', 'loading');

  iframe.onload = () => {
    loadCount++;
    applyZoom();
    setStatus('Código ' + code + ' cargado.', 'ok');
    resultWrap.scrollIntoView({ behavior:'smooth', block:'start' });
  };
}

// Detectar navegación dentro del iframe → cerrar
iframe.addEventListener('load', () => {
  if (loadCount === 0) return;
  let changed = false;
  try {
    const current = iframe.contentWindow.location.href;
    changed = (current !== expectedUrl && current !== 'about:blank');
  } catch(e) {
    changed = true; // cross-origin → cerrar
  }
  if (changed && resultWrap.classList.contains('show')) closeResult();
});

function closeResult() {
  resultWrap.classList.remove('show');
  iframe.src = '';
  loadCount  = 0;
  setStatus('Listo para escanear', 'info');
  manualInput.value = '';
}

// ── Status ───────────────────────────────────────────────────
function setStatus(msg, type = 'info') {
  statusEl.className = 'status show ' + type;
  const loading = type === 'loading';
  statusEl.innerHTML = loading
    ? `<div class="spinner"></div><span>${msg}</span>`
    : `<div class="dot"></div><span>${msg}</span>`;
}

manualInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitCode(manualInput.value.trim());
});
</script>
</body>
</html>
